# -----------------------------------------------------------------------------
# Dev profile — in-memory H2 database so `mvnw spring-boot:run` needs no
# local Postgres install. Change to a local Postgres URL when working on
# real persistence.
# -----------------------------------------------------------------------------

spring:
  datasource:
    url: jdbc:h2:mem:eazicut;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    # Flyway (see application.yml) is the schema authority in every profile.
    # Hibernate only validates that the entity model matches the migrated
    # schema — it never mutates the database.
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true
      path: /h2-console

  # Dev-only Basic auth user so @PreAuthorize("hasRole('ADMIN')") endpoints
  # can be tested locally. In prod these properties are not set, so writes
  # return 403 until the JWT auth ticket wires real users.
  security:
    user:
      name: admin
      password: admin
      roles: ADMIN

eazicut:
  allowed-origins: http://localhost:3000

logging:
  level:
    com.eazicut: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
