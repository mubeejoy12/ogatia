# -----------------------------------------------------------------------------
# Eazi Cut API — base configuration
#
# Profile-specific overrides live in application-{dev,prod}.yml. Pick a
# profile with `--spring.profiles.active=dev` (or the SPRING_PROFILES_ACTIVE
# env var). Local `mvnw spring-boot:run` defaults to `dev`.
# -----------------------------------------------------------------------------

spring:
  application:
    name: eazi-cut-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # JPA sensible defaults — overridden per profile
  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

  # Return 404 (instead of a stack trace) for unmapped routes so the
  # global exception handler can shape the response body.
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false

  # Bound pagination server-side so a malicious ?size=1000000 request can't
  # exhaust memory. Clients requesting above the cap get the cap back.
  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100
        one-indexed-parameters: false

  # Flyway is the schema authority. Hibernate is set to ddl-auto=validate
  # in every profile (application-dev.yml and application-prod.yml) so it
  # only cross-checks that the entity model matches the migrated schema —
  # it never mutates the database itself.
  #
  # baseline-on-migrate is deliberately false: we always start from an
  # empty schema and let V1 run. If a partial pre-Flyway schema is ever
  # encountered on prod, the correct response is a one-off manual
  # `mvn flyway:baseline` rather than silently skipping migrations.
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true

server:
  port: ${PORT:8080}
  servlet:
    # Every controller is auto-prefixed with /api/v1 — no @RequestMapping
    # needs to include it. Flip once when the API branches to v2.
    context-path: /api/v1
  error:
    include-message: never
    include-stacktrace: never
    include-binding-errors: never

# Application-level namespaces used by our own beans (see CorsConfig).
eazicut:
  allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000}

management:
  endpoints:
    web:
      # Actuator exposed on the main port for now; move to a separate
      # management port if the frontend origin ever needs to be denied
      # actuator access.
      base-path: /actuator
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
